name: Fetch Data & Deploy to GitHub Pages

on:
  # Run automatically every day at 6:00 AM UTC (2AM ET / 11PM PT)
  schedule:
    - cron: '0 6 * * *'

  # Also run on every push to main (for manual updates / code changes)
  push:
    branches:
      - main

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

# Grant write permission to push the built site to gh-pages branch
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Check out the repository ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js for the build script ───────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      # ── 3. Install script dependencies ───────────────────────────
      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      # ── 4. Fetch all live data from public APIs ───────────────────
      - name: Fetch Congressional data from Congress.gov
        working-directory: scripts
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: node fetch-members.js

      - name: Fetch STOCK Act disclosures (HouseStockWatcher + SenateStockWatcher)
        working-directory: scripts
        run: node fetch-trades.js

      - name: Fetch campaign finance data (FEC Open API)
        working-directory: scripts
        run: node fetch-finance.js

      - name: Fetch lobbying registrations (Senate LDA API)
        working-directory: scripts
        run: node fetch-lobbying.js

      # ── 5. Bake fetched JSON into the HTML file ───────────────────
      - name: Build site — inject data into HTML
        working-directory: scripts
        run: node build.js

      # ── 6. Commit updated data files (for transparency / history) ─
      - name: Commit updated data files
        run: |
          git config user.name "Capitol Index Bot"
          git config user.email "bot@capitol-index"
          git add data/
          git diff --staged --quiet || git commit -m "chore: auto-update data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main || echo "No data changes to push"

      # ── 7. Deploy built site to GitHub Pages ─────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: "deploy: ${{ github.sha }} — $(date -u '+%Y-%m-%d %H:%M UTC')"
          force_orphan: false

  # ── Notify on failure ────────────────────────────────────────────
  notify-on-failure:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: failure()
    steps:
      - name: Log failure
        run: |
          echo "::error::Capitol Index daily build failed. Check the Actions log for details."
          echo "Common causes: Congress.gov API key expired, rate limit hit, or upstream API change."
